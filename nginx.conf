server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Convenience: redirect root to the app base path
  location = / {
    return 302 /pwa-modeller/;
  }
  location = /pwa-modeller {
    return 301 /pwa-modeller/;
  }

  # Cache-bustable assets (Vite outputs hashed filenames)
  location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|webp|woff2?|ttf|map)$ {
    try_files $uri =404;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
  }

  # Service worker should not be cached aggressively (support common filenames)
  location ~* ^/pwa-modeller/(?:service-worker\.js|sw\.js)$ {
    try_files $uri =404;
    add_header Cache-Control "no-cache";
  }

  # Web manifest should be revalidated
  location = /pwa-modeller/manifest.webmanifest {
    try_files $uri =404;
    add_header Cache-Control "no-cache";
  }

  # SPA fallback under /pwa-modeller/
  location /pwa-modeller/ {
    try_files $uri $uri/ /pwa-modeller/index.html;
  }
}
